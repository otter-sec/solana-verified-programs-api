name: Verify smoke

# Drives the real `solana-verify` build for a known-verified program through
# our `/verify_sync` endpoint. Slow (~10-20 min) and depends on Docker Hub,
# GitHub, and mainnet RPC, so it runs on a weekly cron rather than per-PR.
on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-verify-smoke-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-verify-smoke-

      - name: Install solana-verify CLI
        run: cargo install solana-verify --locked

      - name: Run verify smoke test
        env:
          VERIFY_SMOKE_RPC_URL: ${{ secrets.RPC_URL || 'https://api.mainnet-beta.solana.com' }}
        run: cargo test --test verify_smoke -- --ignored --nocapture
