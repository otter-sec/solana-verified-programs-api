name: Build and Release

on:
  push:
    tags:
    - '**'

jobs:
  build:
    uses: otter-eng/workflows/.github/workflows/build-image.yaml@main
    with:
      environment: prod
      name: ${{ matrix.image.name }}
      tag: ${{ github.ref_name }}
      dockerfile: ${{ matrix.image.dockerfile }}
    strategy:
      fail-fast: true
      matrix:
        image:
        - { name: 'api', dockerfile: 'Dockerfile' }
    permissions:
      contents: read
      id-token: write

  release:
    needs: build
    uses: otter-eng/workflows/.github/workflows/deploy-to-gke.yaml@main
    with:
      environment: prod
      containers: "api=api:${{ github.ref_name }}"
    permissions:
      contents: read
      id-token: write
